<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Sneak</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;font-family:Consolas,monospace;color:#fff;
      display:flex;flex-direction:column;align-items:center;
      min-height:100dvh;touch-action:none;}

    .screen{display:none;flex-direction:column;align-items:center;
      justify-content:center;gap:16px;min-height:100dvh;padding:30px 20px;}
    .screen.active{display:flex;}

    h1{font-size:clamp(2rem,10vw,3.5rem);color:#32c832;letter-spacing:8px;}

    input{background:#111;border:2px solid #333;border-radius:8px;color:#fff;
      font-family:inherit;font-size:.95rem;padding:11px 14px;
      width:min(300px,90vw);text-align:center;outline:none;}
    input:focus{border-color:#32c832;}

    .btn{background:#32c832;color:#000;border:none;border-radius:8px;
      font-family:inherit;font-weight:bold;font-size:1rem;
      padding:14px 0;cursor:pointer;width:min(300px,90vw);}
    .btn:active{background:#28a828;}
    .btn.sec{background:transparent;color:#32c832;border:2px solid #333;}
    .btn.sec:active{background:#0a140a;}

    /* Game screen */
    #game{flex-direction:column;align-items:center;width:100%;height:100dvh;overflow:hidden;}

    #bar{display:flex;align-items:center;justify-content:space-between;
      width:100%;padding:6px 12px;min-height:36px;}
    #score-lbl{font-size:.85rem;color:#32c832;}
    #bar-btns{display:flex;gap:6px;}
    #bar-btns button{background:#111;border:1px solid #222;border-radius:6px;
      color:#555;font-size:.65rem;font-family:inherit;padding:4px 9px;cursor:pointer;}
    #bar-btns button:active{color:#32c832;background:#1a1a1a;}

    #cw{position:relative;width:min(100vw, calc(100dvh - 180px) * 1.25);}
    canvas{border:2px solid #111;background:#050505;display:block;width:100%;height:auto;touch-action:none;}

    /* Overlay */
    #ov{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.92);}
    #ov.hidden{display:none;}
    #ov-title{font-size:clamp(1.2rem,5vw,1.8rem);color:#32c832;letter-spacing:3px;}
    #ov-score{font-size:clamp(.9rem,3vw,1.1rem);color:#555;}
    #ov-play{background:#32c832;color:#000;border:none;border-radius:8px;
      font-family:inherit;font-weight:bold;font-size:1rem;padding:13px 40px;cursor:pointer;}
    #ov-play:active{background:#28a828;}
    #ov-home{background:transparent;color:#32c832;border:2px solid #333;border-radius:8px;
      font-family:inherit;font-weight:bold;font-size:.9rem;padding:11px 30px;cursor:pointer;}
    #ov-home:active{background:#0a140a;}

    /* D-pad */
    #dpad{display:grid;grid-template-areas:'. u .' 'l . r' '. d .';
      grid-template-columns:repeat(3,58px);grid-template-rows:repeat(3,58px);
      gap:5px;margin-top:10px;flex-shrink:0;}
    #dpad button{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;
      color:#32c832;font-size:1.2rem;cursor:pointer;display:flex;
      align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;}
    #dpad button:active{background:#151515;border-color:#32c832;}
    #du{grid-area:u;}#dl{grid-area:l;}#dr{grid-area:r;}#dd{grid-area:d;}
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <h1>SNEAK</h1>
  <input id="iname" maxlength="14" placeholder="Your name (optional)" autocomplete="off"/>
  <button class="btn" id="bplay">PLAY</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="bar">
    <span id="score-lbl">Score: 0</span>
    <div id="bar-btns">
      <button id="bbtn-restart">RESTART</button>
      <button id="bbtn-home">HOME</button>
    </div>
  </div>
  <div id="cw">
    <canvas id="c"></canvas>
    <div id="ov" class="hidden">
      <div id="ov-title">GAME OVER</div>
      <div id="ov-score"></div>
      <button id="ov-play">PLAY AGAIN</button>
      <button id="ov-home">HOME</button>
    </div>
  </div>
  <div id="dpad">
    <button id="du">▲</button>
    <button id="dl">◀</button>
    <button id="dr">▶</button>
    <button id="dd">▼</button>
  </div>
</div>

<script>
const TILE=20, COLS=30, ROWS=24, TICK=130, FOOD=3
const UP=[0,-1], DN=[0,1], LT=[-1,0], RT=[1,0]

const canvas=document.getElementById('c'), ctx=canvas.getContext('2d')
canvas.width=COLS*TILE; canvas.height=ROWS*TILE

let snake, dir, nextDir, food, score, gt, playerName

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}
showScreen('lobby')

document.getElementById('bplay').onclick=startGame
document.getElementById('iname').onkeydown=e=>{if(e.key==='Enter')startGame()}

function startGame(){
  playerName=document.getElementById('iname').value.trim().slice(0,14)||'Player'
  showScreen('game')
  restartGame()
}

function restartGame(){
  snake=[[15,12],[14,12],[13,12]]
  dir=RT; nextDir=RT
  food=[]; score=0
  spawnFood()
  updateScore()
  document.getElementById('ov').classList.add('hidden')
  clearInterval(gt)
  gt=setInterval(tick,TICK)
}

function goHome(){
  clearInterval(gt); gt=null
  document.getElementById('ov').classList.add('hidden')
  showScreen('lobby')
}

document.getElementById('bbtn-restart').onclick=restartGame
document.getElementById('bbtn-home').onclick=goHome
document.getElementById('ov-play').onclick=restartGame
document.getElementById('ov-home').onclick=goHome

// Game logic
function spawnFood(){
  const occ=new Set(snake.map(([x,y])=>x+','+y))
  food.forEach(([x,y])=>occ.add(x+','+y))
  while(food.length<FOOD){
    let p
    do{p=[~~(Math.random()*COLS),~~(Math.random()*ROWS)]}
    while(occ.has(p[0]+','+p[1]))
    food.push(p); occ.add(p[0]+','+p[1])
  }
}

function tick(){
  dir=nextDir
  const head=[snake[0][0]+dir[0], snake[0][1]+dir[1]]

  // Wall collision
  if(head[0]<0||head[0]>=COLS||head[1]<0||head[1]>=ROWS){gameOver();return}
  // Self collision
  if(snake.some(([x,y])=>x===head[0]&&y===head[1])){gameOver();return}

  snake.unshift(head)
  const fi=food.findIndex(([fx,fy])=>fx===head[0]&&fy===head[1])
  if(fi!==-1){score+=10;food.splice(fi,1);spawnFood()}
  else snake.pop()

  updateScore()
  draw()
}

function gameOver(){
  clearInterval(gt); gt=null
  draw()
  document.getElementById('ov-title').textContent='GAME OVER'
  document.getElementById('ov-score').textContent=playerName+' — Score: '+score
  document.getElementById('ov').classList.remove('hidden')
}

function updateScore(){
  document.getElementById('score-lbl').textContent='Score: '+score
}

// Drawing
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height)

  // Grid
  ctx.strokeStyle='#0d0d0d'; ctx.lineWidth=.5
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*TILE,0);ctx.lineTo(x*TILE,canvas.height);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*TILE);ctx.lineTo(canvas.width,y*TILE);ctx.stroke()}

  // Food
  food.forEach(([fx,fy])=>{
    const cx=fx*TILE+TILE/2, cy=fy*TILE+TILE/2
    ctx.fillStyle='#c82828'; ctx.beginPath(); ctx.arc(cx,cy,TILE/2-2,0,Math.PI*2); ctx.fill()
    ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(cx,cy,TILE/4,0,Math.PI*2); ctx.fill()
  })

  // Snake
  snake.forEach(([x,y],i)=>{
    ctx.fillStyle= i===0 ? '#32c832' : '#228822'
    rr(x*TILE+1,y*TILE+1,TILE-2,TILE-2,4); ctx.fill()
    if(i>0){
      ctx.fillStyle='#1a5c1a'
      rr(x*TILE+5,y*TILE+5,TILE-10,TILE-10,2); ctx.fill()
    }
  })
}

function rr(x,y,w,h,r){
  ctx.beginPath()
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r)
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r)
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y)
  ctx.closePath()
}

// Controls
function opp(a,b){return a[0]===-b[0]&&a[1]===-b[1]}
function move(d){if(!opp(d,dir))nextDir=d}

document.addEventListener('keydown',e=>{
  const m={ArrowUp:UP,w:UP,W:UP,ArrowDown:DN,s:DN,S:DN,
           ArrowLeft:LT,a:LT,A:LT,ArrowRight:RT,d:RT,D:RT}
  if(m[e.key]){move(m[e.key]);e.preventDefault()}
})

document.getElementById('du').addEventListener('pointerdown',e=>{e.preventDefault();move(UP)})
document.getElementById('dd').addEventListener('pointerdown',e=>{e.preventDefault();move(DN)})
document.getElementById('dl').addEventListener('pointerdown',e=>{e.preventDefault();move(LT)})
document.getElementById('dr').addEventListener('pointerdown',e=>{e.preventDefault();move(RT)})

// Swipe on canvas
let tx=null,ty=null
canvas.addEventListener('touchstart',e=>{e.preventDefault();tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:false})
canvas.addEventListener('touchend',e=>{
  e.preventDefault(); if(tx===null)return
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return
  move(Math.abs(dx)>Math.abs(dy)?(dx>0?RT:LT):(dy>0?DN:UP))
  tx=ty=null
},{passive:false})
</script>
</body>
</html>
