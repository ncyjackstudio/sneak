<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Sneak</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;font-family:Consolas,monospace;color:#fff;
      display:flex;flex-direction:column;align-items:center;
      min-height:100dvh;touch-action:none;}

    .screen{display:none;flex-direction:column;align-items:center;
      justify-content:center;gap:16px;min-height:100dvh;padding:30px 20px;}
    .screen.active{display:flex;}

    h1{font-size:clamp(2rem,10vw,3.5rem);color:#32c832;letter-spacing:8px;}
    p{color:#555;font-size:.83rem;text-align:center;line-height:1.6;max-width:300px;}

    input{background:#111;border:2px solid #333;border-radius:8px;color:#fff;
      font-family:inherit;font-size:.95rem;padding:11px 14px;
      width:min(320px,92vw);text-align:center;outline:none;}
    input:focus{border-color:#32c832;}
    .btn{background:#32c832;color:#000;border:none;border-radius:8px;
      font-family:inherit;font-weight:bold;font-size:1rem;
      padding:14px 0;cursor:pointer;width:min(320px,92vw);}
    .btn:active{background:#28a828;}
    .btn.sec{background:transparent;color:#32c832;border:2px solid #333;}
    .btn.sec:active{background:#0a140a;}
    .sep{color:#222;font-size:.8rem;}

    /* Game */
    #game{flex-direction:column;align-items:center;width:100%;height:100dvh;overflow:hidden;}
    #bar{display:flex;align-items:center;justify-content:center;
      width:100%;padding:4px 8px;gap:6px;flex-wrap:wrap;min-height:30px;}
    .chip{display:flex;align-items:center;gap:4px;background:#0d0d0d;
      border-radius:20px;padding:2px 8px;font-size:.73rem;}
    .chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .chip.dead{opacity:.28;text-decoration:line-through;}
    #rlbl{font-size:.65rem;color:#2a2a2a;}

    #cw{position:relative;width:min(100vw, calc(100dvh - 168px) * 1.25);}
    canvas{border:2px solid #111;background:#050505;display:block;width:100%;height:auto;touch-action:none;}

    #ov{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.92);}
    #ov.hidden{display:none;}
    #ov-t{font-size:clamp(1rem,5vw,1.6rem);color:#32c832;letter-spacing:2px;}
    #ov-p{color:#555;font-size:.82rem;text-align:center;padding:0 16px;white-space:pre-line;}
    #ov-code{font-size:clamp(1.8rem,8vw,2.8rem);color:#fff;letter-spacing:10px;
      background:#111;border:2px solid #222;padding:10px 24px;border-radius:8px;cursor:pointer;display:none;}
    #ov-hint{font-size:.68rem;color:#2a2a2a;}
    #ov-go{background:#32c832;color:#000;border:none;border-radius:8px;
      font-family:inherit;font-weight:bold;font-size:1rem;padding:13px 40px;cursor:pointer;display:none;}
    #ov-go:active{background:#28a828;}

    #dpad{display:grid;grid-template-areas:'. u .' 'l . r' '. d .';
      grid-template-columns:repeat(3,58px);grid-template-rows:repeat(3,58px);
      gap:5px;margin-top:8px;flex-shrink:0;}
    #dpad button{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;
      color:#32c832;font-size:1.2rem;cursor:pointer;display:flex;
      align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;}
    #dpad button:active{background:#151515;border-color:#32c832;}
    #du{grid-area:u;}#dl{grid-area:l;}#dr{grid-area:r;}#dd{grid-area:d;}

    #toast{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
      background:#111;color:#777;padding:5px 14px;border-radius:14px;
      font-size:.73rem;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:9;}
    #toast.show{opacity:1;}
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <h1>SNEAK</h1>
  <input id="iname" maxlength="14" placeholder="Your name (optional)" autocomplete="off"/>
  <button class="btn" id="bcreate">CREATE ROOM</button>
  <span class="sep">— or —</span>
  <input id="icode" maxlength="6" placeholder="Room code"
    style="text-transform:uppercase;letter-spacing:5px;font-size:1.2rem;" autocomplete="off"/>
  <button class="btn sec" id="bjoin">JOIN ROOM</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="bar"><span id="rlbl"></span></div>
  <div id="cw">
    <canvas id="c"></canvas>
    <div id="ov">
      <div id="ov-t">LOADING</div>
      <div id="ov-p"></div>
      <div id="ov-code"></div>
      <div id="ov-hint"></div>
      <button id="ov-go">START PLAYING ▶</button>
    </div>
  </div>
  <div id="dpad">
    <button id="du">▲</button><button id="dl">◀</button>
    <button id="dr">▶</button><button id="dd">▼</button>
  </div>
</div>
<div id="toast"></div>

<script>
// ── constants ──────────────────────────────────────────────
const TILE=20,COLS=30,ROWS=24,TICK=150,FOOD=3
const COLORS=['#32c832','#e03232','#3264e0','#e0c832','#c832c8','#32c8c8']
const STARTS=[[5,5],[25,5],[5,18],[25,18],[15,5],[15,18]]
const UP=[0,-1],DN=[0,1],LT=[-1,0],RT=[1,0]
const FB='https://sneak-3c9c1-default-rtdb.asia-southeast1.firebasedatabase.app'

// ── dom ────────────────────────────────────────────────────
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d')
canvas.width=COLS*TILE; canvas.height=ROWS*TILE

// ── state ──────────────────────────────────────────────────
let myId=null,isHost=false,myCode='',myName=''
let gt=null,ci=0,pl={},fd=[]
let esState=null,esDirs=null,esPlayers=null

// ── firebase REST helpers ──────────────────────────────────
function fbSet(path,data){
  return fetch(FB+'/'+path+'.json',{method:'PUT',body:JSON.stringify(data),
    headers:{'Content-Type':'application/json'}}).catch(()=>{})
}
function fbGet(path){
  return fetch(FB+'/'+path+'.json').then(r=>r.json()).catch(()=>null)
}
function fbDel(path){
  return fetch(FB+'/'+path+'.json',{method:'DELETE'}).catch(()=>{})
}
function fbListen(path,cb){
  const es=new EventSource(FB+'/'+path+'.json')
  es.addEventListener('put',e=>{try{cb(JSON.parse(e.data).data)}catch(err){}})
  es.addEventListener('patch',e=>{try{cb(JSON.parse(e.data).data)}catch(err){}})
  es.onerror=()=>{}
  return es
}

// ── screens ────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}
showScreen('lobby')

// ── lobby ──────────────────────────────────────────────────
document.getElementById('bcreate').onclick=()=>{
  myName=getName()
  myCode=randCode()
  myId='p'+Date.now()+Math.random().toString(36).slice(2,6)
  isHost=true
  showScreen('game')
  startHost()
}
document.getElementById('bjoin').onclick=()=>{
  const code=document.getElementById('icode').value.trim().toUpperCase()
  if(!code){alert('Enter a room code.');return}
  myName=getName()
  myCode=code
  myId='p'+Date.now()+Math.random().toString(36).slice(2,6)
  isHost=false
  showScreen('game')
  startClient()
}
document.getElementById('icode').onkeydown=e=>{if(e.key==='Enter')document.getElementById('bjoin').click()}

function getName(){return document.getElementById('iname').value.trim().slice(0,14)||'Player'+~~(Math.random()*99+1)}
function randCode(){return Math.random().toString(36).slice(2,6).toUpperCase()}

// ── host ───────────────────────────────────────────────────
function startHost(){
  setOv('YOUR ROOM CODE','Share this with friends:')
  const ovCode=document.getElementById('ov-code')
  ovCode.textContent=myCode; ovCode.style.display='block'
  document.getElementById('ov-hint').textContent='Tap code to copy'
  document.getElementById('ov-go').style.display='block'
  document.getElementById('rlbl').textContent='Room: '+myCode

  ci=0; pl={}; fd=[]
  addPl(myId,myName)
  spawnFd()

  // Write room info
  fbSet('rooms/'+myCode+'/host',myId)
  fbDel('rooms/'+myCode+'/state')
  fbDel('rooms/'+myCode+'/dirs')
  fbSet('rooms/'+myCode+'/players/'+myId,{name:myName,ts:Date.now()})

  // Listen for new players
  if(esPlayers){esPlayers.close();esPlayers=null}
  esPlayers=fbListen('rooms/'+myCode+'/players',data=>{
    if(!data)return
    Object.entries(data).forEach(([pid,v])=>{
      if(pid===myId||!v)return
      if(!pl[pid]){addPl(pid,v.name||'Player');toast((v.name||'Player')+' joined!')}
    })
  })

  // Listen for direction changes
  if(esDirs){esDirs.close();esDirs=null}
  esDirs=fbListen('rooms/'+myCode+'/dirs',data=>{
    if(!data)return
    Object.entries(data).forEach(([pid,d])=>{
      if(!Array.isArray(d))return
      const p=pl[pid]
      if(p&&p.alive&&!opp(d,p.dir))p.nextDir=d
    })
  })

  startLoop()
}

// ── client ─────────────────────────────────────────────────
function startClient(){
  setOv('CONNECTING…','Joining room '+myCode+'…')

  // Register self
  fbSet('rooms/'+myCode+'/players/'+myId,{name:myName,ts:Date.now()})

  // Check host exists
  fbGet('rooms/'+myCode+'/host').then(hostId=>{
    if(!hostId){
      setOv('NOT FOUND','Room "'+myCode+'" not found.\nAsk the host to share their code.')
      return
    }
    setOv('CONNECTED!','Waiting for game state…')

    // Listen for game state
    if(esState){esState.close();esState=null}
    esState=fbListen('rooms/'+myCode+'/state',data=>{
      if(!data)return
      document.getElementById('ov').classList.add('hidden')
      try{renderAll(data.p,data.f)}catch(e){}
    })

    // Listen for round end via state having roundEnd flag
    // (handled inside state listener above)
  })
}

// ── game logic ─────────────────────────────────────────────
function addPl(id,name){
  if(pl[id])return
  const i=ci++
  pl[id]={id,name,color:COLORS[i%COLORS.length],
    snake:[STARTS[i%STARTS.length].slice()],dir:RT,nextDir:RT,score:0,alive:true}
}
function opp(a,b){return a[0]===-b[0]&&a[1]===-b[1]}
function randPos(ex){
  let p;do{p=[~~(Math.random()*COLS),~~(Math.random()*ROWS)]}
  while(ex.has(p[0]+','+p[1]));return p
}
function cells(){
  const s=new Set()
  for(const p of Object.values(pl))for(const[x,y]of p.snake)s.add(x+','+y)
  return s
}
function spawnFd(){
  const occ=cells();fd.forEach(([x,y])=>occ.add(x+','+y))
  while(fd.length<FOOD)fd.push(randPos(occ))
}
function startLoop(){clearInterval(gt);gt=setInterval(tick,TICK)}

function tick(){
  const ps=Object.values(pl);if(!ps.length)return
  for(const p of ps){if(!p.alive)continue;p.dir=p.nextDir
    p.nh=[p.snake[0][0]+p.dir[0],p.snake[0][1]+p.dir[1]]}
  for(const p of ps){if(!p.alive)continue
    const[hx,hy]=p.nh
    if(hx<0||hx>=COLS||hy<0||hy>=ROWS){p.alive=false;continue}
    if(p.snake.slice(1,-1).some(([x,y])=>x===hx&&y===hy)){p.alive=false;continue}
    for(const o of ps){if(o.id===p.id||!o.alive)continue
      if(o.snake.some(([x,y])=>x===hx&&y===hy)){p.alive=false;break}}
  }
  for(const p of ps){if(!p.alive)continue
    p.snake.unshift(p.nh)
    const fi=fd.findIndex(([fx,fy])=>fx===p.nh[0]&&fy===p.nh[1])
    if(fi!==-1){p.score+=10;fd.splice(fi,1)}else p.snake.pop()
  }
  spawnFd()
  const state={p:ps.map(p=>({id:p.id,name:p.name,color:p.color,snake:p.snake,score:p.score,alive:p.alive})),f:fd}
  renderAll(state.p,state.f)
  fbSet('rooms/'+myCode+'/state',state)

  const alive=ps.filter(p=>p.alive)
  if(ps.length>1&&alive.length<=1){
    clearInterval(gt);gt=null
    setTimeout(()=>{
      setOv('ROUND OVER','Next round in 4 seconds…')
      setTimeout(()=>{
        ci=0;pl={};fd=[]
        // re-add all known players from Firebase
        fbGet('rooms/'+myCode+'/players').then(data=>{
          const entries=data?Object.entries(data):[]
          entries.forEach(([id,v])=>addPl(id,v.name||'Player'))
          if(!pl[myId])addPl(myId,myName)
          spawnFd();startLoop()
          document.getElementById('ov').classList.add('hidden')
        })
      },4000)
    },600)
  }
}

// ── render ─────────────────────────────────────────────────
function renderAll(ps,f){drawBar(ps);draw(ps,f)}
function drawBar(ps){
  const bar=document.getElementById('bar')
  bar.querySelectorAll('.chip').forEach(c=>c.remove())
  ps.forEach(p=>{
    const c=document.createElement('div')
    c.className='chip'+(p.alive?'':' dead')
    c.innerHTML='<span class="dot" style="background:'+p.color+'"></span>'+
      '<span>'+esc(p.name)+'</span>'+
      '<span style="color:'+p.color+';margin-left:3px">'+p.score+'</span>'
    bar.appendChild(c)
  })
  bar.appendChild(document.getElementById('rlbl'))
}
function draw(ps,f){
  ctx.clearRect(0,0,canvas.width,canvas.height)
  ctx.strokeStyle='#111';ctx.lineWidth=.5
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*TILE,0);ctx.lineTo(x*TILE,canvas.height);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*TILE);ctx.lineTo(canvas.width,y*TILE);ctx.stroke()}
  f.forEach(([fx,fy])=>{
    const cx=fx*TILE+TILE/2,cy=fy*TILE+TILE/2
    ctx.fillStyle='#c82828';ctx.beginPath();ctx.arc(cx,cy,TILE/2-3,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(cx,cy,TILE/4,0,Math.PI*2);ctx.fill()
  })
  ;[...ps].sort((a,b)=>a.alive-b.alive).forEach(p=>{
    ctx.globalAlpha=p.alive?1:.22
    p.snake.forEach(([x,y],i)=>{
      ctx.fillStyle=p.color;rr(x*TILE+1,y*TILE+1,TILE-2,TILE-2,4);ctx.fill()
      if(i>0){ctx.fillStyle=dk(p.color);rr(x*TILE+5,y*TILE+5,TILE-10,TILE-10,2);ctx.fill()}
    });ctx.globalAlpha=1
  })
}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function dk(h){const n=parseInt(h.slice(1),16);return'rgb('+Math.max(0,((n>>16)&255)-60)+','+Math.max(0,((n>>8)&255)-60)+','+Math.max(0,(n&255)-60)+')'}
function setOv(t,p){document.getElementById('ov-t').textContent=t;document.getElementById('ov-p').textContent=p;document.getElementById('ov').classList.remove('hidden')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ── overlay buttons ────────────────────────────────────────
document.getElementById('ov-go').onclick=()=>{document.getElementById('ov').classList.add('hidden')}
document.getElementById('ov-code').onclick=()=>{
  const code=document.getElementById('ov-code').textContent
  if(navigator.clipboard)navigator.clipboard.writeText(code).then(()=>toast('Copied!'))
}

// ── controls ───────────────────────────────────────────────
function sendDir(d){
  if(isHost){const p=pl[myId];if(p&&p.alive&&!opp(d,p.dir))p.nextDir=d}
  else fbSet('rooms/'+myCode+'/dirs/'+myId,d)
}
document.addEventListener('keydown',e=>{
  const m={ArrowUp:UP,w:UP,W:UP,ArrowDown:DN,s:DN,S:DN,ArrowLeft:LT,a:LT,A:LT,ArrowRight:RT,d:RT,D:RT}
  if(m[e.key]){sendDir(m[e.key]);e.preventDefault()}
})
document.getElementById('du').addEventListener('pointerdown',e=>{e.preventDefault();sendDir(UP)})
document.getElementById('dd').addEventListener('pointerdown',e=>{e.preventDefault();sendDir(DN)})
document.getElementById('dl').addEventListener('pointerdown',e=>{e.preventDefault();sendDir(LT)})
document.getElementById('dr').addEventListener('pointerdown',e=>{e.preventDefault();sendDir(RT)})
let tx=null,ty=null
canvas.addEventListener('touchstart',e=>{e.preventDefault();tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:false})
canvas.addEventListener('touchend',e=>{
  e.preventDefault();if(tx===null)return
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return
  sendDir(Math.abs(dx)>Math.abs(dy)?(dx>0?RT:LT):(dy>0?DN:UP))
  tx=ty=null
},{passive:false})

let tt
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),2500)}
</script>
</body>
</html>
